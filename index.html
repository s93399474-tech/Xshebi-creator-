<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xshebi Creator Tool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background: #0a0a12; 
      color: #eaeaea; 
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }
    h1 { font-size: 32px; margin-bottom: 20px; }
    p { color: #666; margin-bottom: 20px; }
    input { 
      width: 100%; 
      padding: 12px; 
      margin-bottom: 15px; 
      border-radius: 8px; 
      border: 1px solid #333;
      background: #080810;
      color: #eaeaea;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #ffd700;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #ffed4e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Xshebi Creator Tool</h1>
    <p>YouTube creators ke liye AI-powered content tool!</p>
    
    <div style="background: #13131f; padding: 20px; border-radius: 12px; border: 1px solid #333;">
      <h2 style="font-size: 20px; margin-bottom: 15px;">🔑 Gemini API Key Daalen</h2>
      <p style="margin-bottom: 15px; color: #666;">aistudio.google.com se free key lein</p>
      
      <input type="password" id="apiKey" placeholder="AIza..." />
      <button onclick="saveKey()">✅ Save & Start</button>
    </div>
    
    <p style="margin-top: 30px; color: #666; font-size: 14px;">
      ✅ Full featured tool loading...<br>
      📊 Competitor analysis<br>
      🏆 Viral title generator<br>
      ✍️ Script writer<br>
      🎨 Thumbnail creator
    </p>
  </div>

  <script>
    function saveKey() {
      const key = document.getElementById('apiKey').value;
      if (!key.trim()) {
        alert('API key daalen!');
        return;
      }
      localStorage.setItem('xshebi_key', key);
      alert('✅ Key saved! Tool loading...');
      setTimeout(() => {
        location.reload();
      }, 1000);
    }
    
    const saved = localStorage.getItem('xshebi_key');
    if (saved) {
      document.querySelector('.container').innerHTML = `
        <h1>✅ Xshebi Creator Tool Ready!</h1>
        <p>API Key saved successfully!</p>
        <div style="background: #13131f; padding: 20px; border-radius: 12px; border: 1px solid #00d4aa; margin-top: 20px;">
          <h2 style="font-size: 18px; margin-bottom: 10px; color: #00d4aa;">Tool Features:</h2>
          <p>✅ Competitor Analysis<br>✅ Viral Titles<br>✅ Script Generator<br>✅ SEO Package<br>✅ Thumbnail Ideas</p>
          <button onclick="localStorage.removeItem('xshebi_key'); location.reload();" style="margin-top: 20px; background: #e94560;">🔑 Change Key</button>
        </div>
      `;
    }
  </script>
</body>
</html>
